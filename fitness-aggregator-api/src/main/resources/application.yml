server:
  port: ${PORT:8080}  # Use Cloud Run's port or default to 8080

spring:
  profiles:
    active: dev
  main:
    lazy-initialization: true
  datasource:
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 600000
      leak-detection-threshold: 60000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
        generate_statistics: false
        query.plan_cache_max_size: 64
        query.plan_parameter_metadata_max_size: 32
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  mail:
    port: 587
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
strava:
  webhook:
    verify-token: ${STRAVA_WEBHOOK_VERIFY_TOKEN}