spring:
  datasource:
    url: ${DEV_DB_URL}
    username: ${DEV_DB_USER}
    password: ${DEV_DB_PASSWORD}
  application:
    name: ${DEV_APP_NAME}
strava:
  CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
  CLIENT_ID: ${STRAVA_CLIENT_ID}
  REDIRECT_URL: ${STRAVA_REDIRECT_URL}
fitbit:
  CLIENT_SECRET: ${FITBIT_CLIENT_SECRET}
  CLIENT_ID: ${FITBIT_CLIENT_ID}
  REDIRECT_URL: ${FITBIT_REDIRECT_URL}
garmin:
  OAUTH_BASE_URL: ${GARMIN_OAUTH_BASE_URL}
  OAUTH_TOKEN_URL: ${GARMIN_OAUTH_TOKEN_URL}
  REDIRECT_URL: ${GARMIN_REDIRECT_URL}
  CLIENT_ID: ${GARMIN_CLIENT_ID}
  CLIENT_SECRET: ${GARMIN_CLIENT_SECRET}
frontend:
  url: ${DEV_FRONTEND_URL}
backend:
  url: ${DEV_BACKEND_URL}

jwt:
  secret: ${JWT_SECRET}
  ttl-days: ${JWT_TTL_DAYS:28}
  issuer: ${JWT_ISSUER}
auth:
  magic:
    ttl-minutes: ${AUTH_MAGIC_TTL_MINUTES}
aws:
  ses:
    region: ${AWS_SES_REGION}
    host: ${AWS_SES_HOST}
    from-email: ${AWS_SES_FROM_EMAIL}