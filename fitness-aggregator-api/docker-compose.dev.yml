services:
  app:
    build:
      context: .
    container_name: ${DEV_APP_NAME}
    ports:
      - "${DEV_APP_PORT}:8080"
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DEV_DB_URL: ${DEV_DB_URL}
      DEV_DB_USER: ${DEV_DB_USER}
      DEV_DB_PASSWORD: ${DEV_DB_PASSWORD}
      DEV_APP_NAME: ${DEV_APP_NAME}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_REDIRECT_URL: ${STRAVA_REDIRECT_URL}
      STRAVA_WEBHOOK_VERIFY_TOKEN: ${STRAVA_WEBHOOK_VERIFY_TOKEN}
      FITBIT_CLIENT_SECRET: ${FITBIT_CLIENT_SECRET}
      FITBIT_CLIENT_ID: ${FITBIT_CLIENT_ID}
      FITBIT_REDIRECT_URL: ${FITBIT_REDIRECT_URL}
      FITBIT_WEBHOOK_VERIFICATION_CODE: ${FITBIT_WEBHOOK_VERIFICATION_CODE}
      GARMIN_OAUTH_BASE_URL: ${GARMIN_OAUTH_BASE_URL}
      GARMIN_BACKFILL_URL: ${GARMIN_BACKFILL_URL}
      GARMIN_OAUTH_TOKEN_URL: ${GARMIN_OAUTH_TOKEN_URL}
      GARMIN_CLIENT_ID: ${GARMIN_CLIENT_ID}
      GARMIN_CLIENT_SECRET: ${GARMIN_CLIENT_SECRET}
      OURA_CLIENT_SECRET: ${OURA_CLIENT_SECRET}
      OURA_CLIENT_ID: ${OURA_CLIENT_ID}
      OURA_OAUTH_URL: ${OURA_OAUTH_URL}
      OURA_SCOPE: ${OURA_SCOPE}
      OURA_REDIRECT_URL: ${OURA_REDIRECT_URL}
      OURA_AUTHORIZE_URL: ${OURA_AUTHORIZE_URL}
      OURA_TOKEN_URL: ${OURA_TOKEN_URL}
      GARMIN_REDIRECT_URL: ${GARMIN_REDIRECT_URL}
      DEV_FRONTEND_URL: ${DEV_FRONTEND_URL}
      DEV_BACKEND_URL: ${DEV_BACKEND_URL}

      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_DAYS: ${JWT_TTL_DAYS}
      JWT_ISSUER: ${JWT_ISSUER}
      AWS_SES_HOST_NAME: ${AWS_SES_HOST_NAME}
      AWS_SES_SMTP_ACCESS_KEY_ID: ${AWS_SES_SMTP_ACCESS_KEY_ID}
      AWS_SES_SMTP_SECRET_ACCESS_KEY: ${AWS_SES_SMTP_SECRET_ACCESS_KEY}
      AWS_SES_REGION: ${AWS_SES_REGION}
      AWS_SES_FROM_EMAIL: ${AWS_SES_FROM_EMAIL}
      AUTH_MAGIC_TTL_MINUTES: ${AUTH_MAGIC_TTL_MINUTES}

      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PRICE_ENHANCED_MONTHLY: ${STRIPE_PRICE_ENHANCED_MONTHLY}
      STRIPE_PRICE_ENHANCED_ANNUAL: ${STRIPE_PRICE_ENHANCED_ANNUAL}

  postgres:
    container_name: ${DEV_DB_CONTAINER_NAME}
    image: postgres:15
    ports:
      - "${DEV_DB_PORT}:5432"
    environment:
      POSTGRES_DB: ${DEV_DB}
      POSTGRES_USER: ${DEV_DB_USER}
      POSTGRES_PASSWORD: ${DEV_DB_PASSWORD}