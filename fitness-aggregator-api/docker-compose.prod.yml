services:
  app:
    build:
      context: .
    container_name: ${PROD_APP_NAME}
    ports:
      - "${PROD_APP_PORT}:8080"
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DEV_DB_URL: ${PROD_DB_URL}
      DEV_DB_USER: ${PROD_DB_USER}
      DEV_DB_PASSWORD: ${PROD_DB_PASSWORD}
      DEV_APP_NAME: ${PROD_APP_NAME}

  postgres:
    container_name: ${PROD_DB_CONTAINER_NAME}
    ports:
      - "${PROD_DB_PORT}:5432"
    environment:
      POSTGRES_DB: ${PROD_DB}
      POSTGRES_USER: ${PROD_DB_USER}
      POSTGRES_PASSWORD: ${PROD_DB_PASSWORD}